<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<link rel="stylesheet" href="../fonts/anima-fonts.css" />
<style>
  /* ============================================================
     RESONANCE — a generative sound garden.
     Aesthetic: meditative / candlelit deep space.
     ============================================================ */
  :root{
    --bg:#05050a; --ink:#efe9e0; --muted:rgba(239,233,224,0.5); --faint:rgba(239,233,224,0.14);
    --accent:#f0c27b; --serif:"Instrument Serif",Georgia,serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);cursor:crosshair;}
  canvas{position:fixed;inset:0;display:block;}

  .mast{position:fixed;top:30px;left:38px;z-index:5;pointer-events:none;animation:fade 1.6s ease both;}
  .mast h1{font-family:var(--serif);font-weight:400;font-size:52px;line-height:0.9;letter-spacing:0.01em;}
  .mast .sub{font-family:var(--mono);font-size:10px;letter-spacing:0.4em;text-transform:uppercase;color:var(--muted);margin-top:8px;margin-left:3px;}

  .bar{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:6;display:flex;align-items:center;gap:20px;
    padding:13px 24px;border-radius:100px;background:rgba(12,11,16,0.6);border:1px solid var(--faint);
    backdrop-filter:blur(20px) saturate(120%);-webkit-backdrop-filter:blur(20px) saturate(120%);box-shadow:0 18px 50px rgba(0,0,0,0.5);
    font-family:var(--mono);font-size:11px;transition:opacity .6s,transform .6s;animation:rise 1.4s .2s cubic-bezier(.16,1,.3,1) both;}
  .bar.dim{opacity:0;transform:translateX(-50%) translateY(16px);pointer-events:none;}
  .scale{font-family:var(--serif);font-size:22px;cursor:pointer;min-width:96px;user-select:none;appearance:none;background:none;border:0;padding:0;color:inherit;text-align:left;}
  .scale:hover{color:var(--accent);}
  .mini{display:flex;flex-direction:column;gap:3px;}
  .mini label{font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
  .mini input{width:78px;}
  .div{width:1px;height:24px;background:var(--faint);}
  .ico{cursor:pointer;color:var(--muted);transition:color .2s;font-size:14px;user-select:none;appearance:none;background:none;border:0;padding:0;font-family:inherit;line-height:1;}
  .ico:hover{color:var(--ink);}
  .ico.on{color:var(--accent);}

  input[type=range]{-webkit-appearance:none;appearance:none;height:3px;background:transparent;cursor:pointer;}
  input[type=range]::-webkit-slider-runnable-track{height:2px;border-radius:2px;background:linear-gradient(to right,var(--accent) var(--fill,50%),rgba(239,233,224,0.16) var(--fill,50%));}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;margin-top:-5px;border-radius:50%;background:#0a0a10;border:1.5px solid var(--accent);}
  input[type=range]::-moz-range-track{height:2px;background:rgba(239,233,224,0.16);border-radius:2px;}
  input[type=range]::-moz-range-thumb{width:10px;height:10px;border-radius:50%;background:#0a0a10;border:1.5px solid var(--accent);}

  .hint{position:fixed;right:38px;bottom:32px;z-index:5;font-family:var(--mono);font-size:10px;letter-spacing:0.16em;line-height:2;color:var(--faint);text-align:right;pointer-events:none;animation:fade 2s 1s ease both;}
  .hint b{color:var(--muted);font-weight:400;}

  .gate{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:rgba(5,5,10,0.4);backdrop-filter:blur(2px);transition:opacity .8s ease;cursor:pointer;}
  .gate.gone{opacity:0;pointer-events:none;}
  .gate div{text-align:center;animation:pulse 2.6s ease-in-out infinite;}
  .gate .big{font-family:var(--serif);font-size:34px;font-style:italic;color:var(--ink);}
  .gate .small{font-family:var(--mono);font-size:11px;letter-spacing:0.34em;text-transform:uppercase;color:var(--muted);margin-top:14px;}

  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateX(-50%) translateY(18px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes pulse{0%,100%{opacity:0.55}50%{opacity:1}}
  @media (max-width:680px){.mast h1{font-size:36px}.hint{display:none}}
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <style>
    .home-link{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:12;font-family:"JetBrains Mono",ui-monospace,monospace;font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:rgba(255,255,255,0.42);text-decoration:none;padding:7px 15px;border:1px solid rgba(255,255,255,0.12);border-radius:100px;background:rgba(10,10,12,0.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:color .25s,border-color .25s,opacity .25s;opacity:0.62;}
    .home-link:hover{color:#fff;border-color:rgba(255,255,255,0.32);opacity:1;}
  </style>
  <a class="home-link" href="../index.html" title="back to the gallery">✦&nbsp;anima</a>

  <div class="mast">
    <h1>Resonance</h1>
    <div class="sub">a generative sound garden</div>
  </div>

  <div class="bar" id="bar">
    <button type="button" class="scale" id="scale" title="change scale" aria-label="Change scale">Pentatonic</button>
    <div class="div"></div>
    <div class="mini"><label>Tempo</label><input type="range" id="tempo" min="0.3" max="2.4" step="0.05" value="1"></div>
    <div class="mini"><label>Space</label><input type="range" id="reverb" min="0" max="1" step="0.02" value="0.6"></div>
    <div class="div"></div>
    <button type="button" class="ico" id="wave" title="waveform (W)" aria-label="Waveform">∿</button>
    <button type="button" class="ico on" id="drone" title="drone (D)" aria-label="Drone">≈</button>
    <button type="button" class="ico" id="clear" title="clear (C)" aria-label="Clear">✕</button>
    <button type="button" class="ico on" id="mute" title="mute (M)" aria-label="Mute">♪</button>
    <button type="button" class="ico" id="save" title="save image (S)" aria-label="Save image">⤓</button>
    <button type="button" class="ico" id="hide" title="hide UI (H)" aria-label="Hide UI">◎</button>
  </div>

  <div class="hint"><div><b>click</b> to plant a singing seed</div><div>seeds ripple &amp; trigger one another</div></div>

  <div class="gate" id="gate"><div><div class="big">Resonance</div><div class="small">click anywhere to begin</div></div></div>

<script>
"use strict";
(() => {
  const canvas=document.getElementById("c"), ctx2d=canvas.getContext("2d");
  let W,H,dpr;
  function resize(){ dpr=Math.min(devicePixelRatio||1,2); W=canvas.width=Math.floor(innerWidth*dpr); H=canvas.height=Math.floor(innerHeight*dpr); canvas.style.width=innerWidth+"px"; canvas.style.height=innerHeight+"px"; }
  addEventListener("resize",resize);

  /* ---------- audio ---------- */
  let actx=null, master=null, conv=null, wetGain=null, dryGain=null, comp=null, droneNodes=null;
  let muted=false, droneOn=true;
  let waveforms=["sine","triangle","sawtooth"], waveIdx=0;

  function makeImpulse(seconds=2.6, decay=2.8){
    const rate=actx.sampleRate, len=rate*seconds, buf=actx.createBuffer(2,len,rate);
    for(let c=0;c<2;c++){ const d=buf.getChannelData(c); for(let i=0;i<len;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); } }
    return buf;
  }
  function initAudio(){
    if(actx) return;
    actx=new (window.AudioContext||window.webkitAudioContext)();
    master=actx.createGain(); master.gain.value=0.0;
    comp=actx.createDynamicsCompressor();
    conv=actx.createConvolver(); conv.buffer=makeImpulse();
    wetGain=actx.createGain(); dryGain=actx.createGain();
    setReverb(parseFloat(document.getElementById("reverb").value));
    conv.connect(wetGain); wetGain.connect(comp); dryGain.connect(comp); comp.connect(master); master.connect(actx.destination);
    master.gain.linearRampToValueAtTime(0.9, actx.currentTime+1.2);
    startDrone();
  }
  function setReverb(v){ if(!wetGain) return; wetGain.gain.value=v; dryGain.gain.value=1-0.4*v; }

  function startDrone(){
    if(!actx||droneNodes) return;
    const g=actx.createGain(); g.gain.value=0; g.connect(dryGain); g.connect(conv);
    const lp=actx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=380; lp.connect(g);
    const base=scaleRoot()/2;
    const oscs=[base, base*1.5, base*2].map((f,i)=>{ const o=actx.createOscillator(); o.type="sine"; o.frequency.value=f; o.detune.value=(i-1)*5; o.connect(lp); o.start(); return o; });
    const lfo=actx.createOscillator(); lfo.frequency.value=0.06; const lg=actx.createGain(); lg.gain.value=120; lfo.connect(lg); lg.connect(lp.frequency); lfo.start();
    g.gain.linearRampToValueAtTime(droneOn?0.10:0.0, actx.currentTime+3);
    droneNodes={g,lp,oscs,lfo,lg};
  }
  function setDrone(on){ droneOn=on; if(droneNodes) droneNodes.g.gain.linearRampToValueAtTime(on?0.10:0.0, actx.currentTime+0.8); document.getElementById("drone").classList.toggle("on",on); }

  /* ---------- scales ---------- */
  const SCALES={
    "Pentatonic":[0,2,4,7,9],
    "Lydian":[0,2,4,6,7,9,11],
    "Aeolian":[0,2,3,5,7,8,10],
    "Hirajoshi":[0,2,3,7,8],
    "Whole-tone":[0,2,4,6,8,10],
  };
  const SNAMES=Object.keys(SCALES); let scaleIdx=0;
  const ROOT=146.83; // D3
  function scaleRoot(){ return ROOT; }
  function freqAt(idx){ const sc=SCALES[SNAMES[scaleIdx]]; const span=sc.length; const oct=Math.floor(idx/span), step=sc[((idx%span)+span)%span]; return ROOT*Math.pow(2,(step+12*oct)/12); }
  const NOTES=18; // vertical resolution of pitches
  function pitchFromY(y){ return Math.max(0, Math.min(NOTES-1, Math.floor((1-y/H)*NOTES))); }

  // colour by pitch (warm low → cool high)
  function pitchColor(p){ const t=p/(NOTES-1); const h=40+t*200; return hsl(h,70,62); }
  function hsl(h,s,l){ s/=100;l/=100; const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l); const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1))); return [Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)]; }

  /* ---------- world ---------- */
  let nodes=[], ripples=[], sparks=[];
  let nextId=0;
  function addNode(x,y){
    const p=pitchFromY(y), col=pitchColor(p);
    nodes.push({ id:nextId++, x,y, p, col, r:7*dpr, flare:0, cool:0, period:3+Math.random()*7, timer:1+Math.random()*4 });
  }
  function chime(node){
    node.flare=1; node.cool=0.35;
    spawnRipple(node);
    for(let i=0;i<6;i++){ const a=Math.random()*6.283, s=(1+Math.random()*2)*dpr; sparks.push({x:node.x,y:node.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:node.col}); }
    if(!actx||muted) return;
    const t=actx.currentTime, f=freqAt(node.p);
    const o=actx.createOscillator(); o.type=waveforms[waveIdx]; o.frequency.value=f;
    const g=actx.createGain();
    const dur=1.6+Math.random()*1.4, peak=0.16;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(peak,t+0.012); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
    o.connect(g); g.connect(dryGain); g.connect(conv);
    o.start(t); o.stop(t+dur+0.05);
  }
  function spawnRipple(node){ ripples.push({x:node.x,y:node.y,r:node.r,max:Math.max(W,H)*0.55,col:node.col,hit:new Set([node.id]),src:node.id}); }

  /* ---------- update + render ---------- */
  function update(dt, speed){
    // nodes: spontaneous pulse + cooldown + flare decay
    for(const n of nodes){
      n.flare*=Math.pow(0.0001,dt); if(n.flare<0.001)n.flare=0;
      n.cool-=dt;
      n.timer-=dt*speed;
      if(n.timer<=0){ n.timer=n.period*(0.6+Math.random()*0.8); chime(n); }
    }
    // ripples expand, trigger nodes
    const rspeed=170*dpr*speed;
    for(let i=ripples.length-1;i>=0;i--){
      const rp=ripples[i]; rp.r+=rspeed*dt;
      for(const n of nodes){ if(rp.hit.has(n.id)) continue; const d=Math.hypot(n.x-rp.x,n.y-rp.y); if(Math.abs(d-rp.r)<n.r+4*dpr){ rp.hit.add(n.id); if(n.cool<=0) chime(n); } }
      if(rp.r>rp.max) ripples.splice(i,1);
    }
    // sparks
    for(let i=sparks.length-1;i>=0;i--){ const s=sparks[i]; s.x+=s.vx; s.y+=s.vy; s.vx*=0.94; s.vy*=0.94; s.life-=dt*1.4; if(s.life<=0) sparks.splice(i,1); }
  }
  function render(){
    ctx2d.globalCompositeOperation="source-over";
    ctx2d.fillStyle="rgba(5,5,10,0.16)"; ctx2d.fillRect(0,0,W,H);
    ctx2d.globalCompositeOperation="lighter";
    // ripples
    for(const rp of ripples){ const a=Math.max(0,(1-rp.r/rp.max))*0.5; ctx2d.strokeStyle=`rgba(${rp.col[0]},${rp.col[1]},${rp.col[2]},${a})`; ctx2d.lineWidth=1.5*dpr; ctx2d.beginPath(); ctx2d.arc(rp.x,rp.y,rp.r,0,6.2832); ctx2d.stroke(); }
    // sparks
    for(const s of sparks){ ctx2d.fillStyle=`rgba(${s.col[0]},${s.col[1]},${s.col[2]},${s.life*0.8})`; ctx2d.beginPath(); ctx2d.arc(s.x,s.y,1.6*dpr,0,6.2832); ctx2d.fill(); }
    // nodes
    for(const n of nodes){
      const fr=n.flare, R=n.r*(1+fr*1.4);
      const g=ctx2d.createRadialGradient(n.x,n.y,0,n.x,n.y,R*5);
      g.addColorStop(0,`rgba(${n.col[0]},${n.col[1]},${n.col[2]},${0.5+fr*0.5})`);
      g.addColorStop(0.5,`rgba(${n.col[0]},${n.col[1]},${n.col[2]},${0.12+fr*0.2})`);
      g.addColorStop(1,"rgba(0,0,0,0)");
      ctx2d.fillStyle=g; ctx2d.beginPath(); ctx2d.arc(n.x,n.y,R*5,0,6.2832); ctx2d.fill();
      ctx2d.fillStyle=`rgba(255,255,255,${0.7+fr*0.3})`; ctx2d.beginPath(); ctx2d.arc(n.x,n.y,R*0.6,0,6.2832); ctx2d.fill();
    }
  }

  let last=performance.now(), paused=false;
  function loop(now){
    const speed=parseFloat(document.getElementById("tempo").value);
    let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
    if(!paused){ update(dt,speed); render(); }
    requestAnimationFrame(loop);
  }

  /* ---------- interaction ---------- */
  const gate=document.getElementById("gate"); let started=false;
  function begin(){ if(started)return; started=true; initAudio(); gate.classList.add("gone"); }
  canvas.addEventListener("pointerdown",e=>{ begin(); addNode(e.clientX*dpr, e.clientY*dpr); const n=nodes[nodes.length-1]; if(n) chime(n); });
  gate.addEventListener("pointerdown",e=>{ begin(); });

  /* ---------- UI ---------- */
  const $=id=>document.getElementById(id);
  function fillSlider(el){ el.style.setProperty("--fill",((el.value-el.min)/(el.max-el.min)*100)+"%"); }
  $("tempo").oninput=e=>fillSlider(e.target);
  $("reverb").oninput=e=>{ fillSlider(e.target); setReverb(parseFloat(e.target.value)); };
  fillSlider($("tempo")); fillSlider($("reverb"));
  $("scale").onclick=()=>{ scaleIdx=(scaleIdx+1)%SNAMES.length; $("scale").textContent=SNAMES[scaleIdx]; };
  $("wave").onclick=()=>{ waveIdx=(waveIdx+1)%waveforms.length; $("wave").textContent=["∿","△","◹"][waveIdx]; };
  $("drone").onclick=()=>setDrone(!droneOn);
  $("clear").onclick=()=>{ nodes=[];ripples=[];sparks=[]; ctx2d.globalCompositeOperation="source-over"; ctx2d.fillStyle="#05050a";ctx2d.fillRect(0,0,W,H); };
  $("mute").onclick=()=>{ muted=!muted; $("mute").textContent=muted?"♪̸":"♪"; $("mute").classList.toggle("on",!muted); if(master)master.gain.linearRampToValueAtTime(muted?0:0.9, actx.currentTime+0.2); };
  $("save").onclick=()=>{ const a=document.createElement("a"); a.download=`resonance-${Date.now()}.png`; a.href=canvas.toDataURL("image/png"); a.click(); };
  let hidden=false;
  $("hide").onclick=()=>{ hidden=!hidden; const bar=$("bar"); bar.classList.toggle("dim",hidden); document.querySelector(".mast").style.opacity=hidden?0:1; document.querySelector(".hint").style.opacity=hidden?0:1; if(hidden&&bar.contains(document.activeElement))document.activeElement.blur(); };

  addEventListener("keydown",e=>{ const k=e.key.toLowerCase();
    if(k==="c")$("clear").click(); else if(k==="w")$("wave").click(); else if(k==="d")$("drone").click();
    else if(k==="m")$("mute").click(); else if(k==="s")$("save").click(); else if(k==="h")$("hide").click();
    else if(k===" "){e.preventDefault();paused=!paused;}
  });

  /* ---------- boot ---------- */
  resize();
  // pre-plant a few seeds so the garden is alive the moment sound begins
  for(let i=0;i<5;i++) addNode((0.2+Math.random()*0.6)*W, (0.25+Math.random()*0.5)*H);
  requestAnimationFrame(loop);

  if(location.search.includes("debug")) window.__pump=(k=300,dt=0.033)=>{ for(let i=0;i<k;i++){ update(dt,1.4); render(); } return {nodes:nodes.length,ripples:ripples.length,audio:actx?actx.state:"none"}; };
})();
</script>
<script src="../anima-nav.js" defer></script>
</body>
</html>
