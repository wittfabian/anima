<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#14141c"/>
      <stop offset="100%" stop-color="#07070b"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <!-- seven living things, one per world, arranged in a ring -->
    <circle cx="50" cy="22" r="6.2" fill="#f4a428"/>
    <circle cx="74.3" cy="35.5" r="6.2" fill="#62c7e0"/>
    <circle cx="76.5" cy="63" r="6.2" fill="#5fe6c0"/>
    <circle cx="50" cy="78" r="6.2" fill="#f0c27b"/>
    <circle cx="23.5" cy="63" r="6.2" fill="#aef24a"/>
    <circle cx="25.7" cy="35.5" r="6.2" fill="#6f9e6a"/>
    <circle cx="50" cy="50" r="7.4" fill="#b98cff"/>
  </g>
</svg>
